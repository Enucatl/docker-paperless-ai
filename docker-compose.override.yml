services:
  broker:
    volumes:
      - redisdata:/data

  db:
    volumes:
      - pgdata:/var/lib/postgresql/data

  webserver:
    networks:
      - traefik_proxy
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - export:/usr/src/paperless/export
      - /opt/paperless-consume:/usr/src/paperless/consume
      - /etc/ssl/certs/ca-certificates.crt:/usr/src/paperless/data/ca-certificates.crt:ro
    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"
      - "traefik.http.routers.paperless.rule=Host(`paperless.${DOCKER_DOMAIN}`)"
      - "traefik.http.routers.paperless.entrypoints=https"
      - "traefik.http.routers.paperless.middlewares=authelia@docker,secured@file"
      - "traefik.http.routers.paperless.tls=true"
      - "traefik.http.routers.paperless.service=paperless"
      - "traefik.http.services.paperless.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik_proxy"

  ai:
    secrets:
      - paperless_token
      - webhook_secret
      - openai_api_key
      - anthropic_api_key
      - google_api_key
      - hf_token
    volumes:
      - ./ai/eval:/app/eval

  ai-cleanup:
    secrets:
      - paperless_token
      - webhook_secret
      - openai_api_key
      - anthropic_api_key
      - google_api_key
      - hf_token

  webhook-listener:
    environment:
      - LOCAL_SEARCH_IDLE_TIMEOUT_SECONDS=${LOCAL_SEARCH_IDLE_TIMEOUT_SECONDS:-180}
      - LOCAL_SEARCH_WARM_ON_CHAT_LOAD=${LOCAL_SEARCH_WARM_ON_CHAT_LOAD:-true}
      - LOCAL_SEARCH_WARM_ON_STARTUP=${LOCAL_SEARCH_WARM_ON_STARTUP:-false}
      - LOCAL_SEARCH_START_METHOD=${LOCAL_SEARCH_START_METHOD:-spawn}

  phoenix:
    volumes:
      - phoenixdata:/root/.phoenix

  qdrant:
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  data:
    external: true
    name: paperless-ai_data
  media:
    external: true
    name: paperless-ai_media
  export:
  pgdata:
  phoenixdata:
  redisdata:
  qdrantdata:

secrets:
  paperless_token:
    file: ./secrets/paperless_token.txt
  webhook_secret:
    file: ./secrets/webhook_secret.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  google_api_key:
    file: ./secrets/google_api_key.txt
  hf_token:
    file: ./secrets/hf_token.txt

networks:
  traefik_proxy:
    external: true
