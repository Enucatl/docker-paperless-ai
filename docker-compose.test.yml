# docker-compose.test.yml — E2E test override for paperless-ai.
#
# Usage (via run_tests.sh):
#   docker compose -f docker-compose.yml -f docker-compose.test.yml ...
#
# Ephemeral strategy:
#   - db and broker use tmpfs (RAM-disk) — disappears the instant the container stops,
#     no named volumes to clean up even if the script is Ctrl+C'd.
#   - webserver, qdrant use anonymous volumes — Docker auto-wipes them on `down -v`.
#   - Dummy LLM keys prevent real API calls even if a mock is accidentally skipped.
#   - The embeddings API is NOT available in tests; the mock_embedder fixture
#     provides deterministic fake vectors directly to run_batch instead.

services:
  db:
    # RAM-disk: lightning-fast Django migrations, zero disk residue.
    tmpfs:
      - /var/lib/postgresql/data:mode=777,uid=999,gid=999

  broker:
    tmpfs:
      - /data

  webserver:
    # Anonymous volumes — Docker auto-wipes them on `down -v`.
    volumes:
      - /usr/src/paperless/data
      - /usr/src/paperless/media
      - /usr/src/paperless/export
      - /usr/src/paperless/consume
    environment:
      # Auto-create the admin user on first boot (idempotent on subsequent boots).
      - PAPERLESS_ADMIN_USER=admin
      - PAPERLESS_ADMIN_PASSWORD=admin
      - PAPERLESS_ADMIN_MAIL=admin@localhost
      - PAPERLESS_SECRET_KEY=test-secret-key-not-for-production
      - PAPERLESS_URL=http://webserver:8000
      - PAPERLESS_OCR_LANGUAGE=eng
      # Allow Paperless to POST webhooks to internal Docker hostnames
      # (webhook-listener is on the same Docker network as webserver).
      - PAPERLESS_ALLOWED_HOSTS=*
      - PAPERLESS_CORS_ALLOWED_HOSTS=http://webserver:8000
      # Clear the production CA cert path — the file doesn't exist in the test environment.
      - PAPERLESS_EMAIL_CERTIFICATE_LOCATION=

  # Qdrant vector DB — anonymous volume so `down -v` leaves no residue.
  qdrant:
    volumes:
      - /qdrant/storage
    healthcheck:
      # Bash TCP pseudo-device: fast, no external tooling needed.
      test: ["CMD", "bash", "-c", ":> /dev/tcp/127.0.0.1/6333"]
      interval: 3s
      timeout: 5s
      retries: 15

  # Webhook listener — receives document events and pushes to Redis DB 1.
  webhook-listener:
    command: >
      bash -lc '
        python /app/fetch_paperless_token.py >/tmp/paperless-token
        export PAPERLESS_TOKEN="$(cat /tmp/paperless-token)"
        exec python -m paperless_listener.server
      '
    environment:
      - REDIS_URL=redis://broker:6379/1
      - PAPERLESS_URL=http://webserver:8000
      - PAPERLESS_TOKEN_FILE=
      - WEBHOOK_SECRET=test-secret-key-12345
      - WEBHOOK_SECRET_FILE=
      - TEST_PAPERLESS_USER=admin
      - TEST_PAPERLESS_PASS=admin
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 3s
      timeout: 5s
      retries: 15
    depends_on:
      broker:
        condition: service_healthy

  ai:
    command: >
      bash -lc '
        python /app/fetch_paperless_token.py >/tmp/paperless-token
        export PAPERLESS_TOKEN="$(cat /tmp/paperless-token)"
        exec python -m paperless_ai.search.copilot_server
      '
    environment:
      - PAPERLESS_URL=http://webserver:8000
      - PAPERLESS_TOKEN_FILE=
      - WEBHOOK_SECRET=test-secret-key-12345
      - WEBHOOK_SECRET_FILE=
      - MANAGE_PAPERLESS_WORKFLOWS=false
      # Dummy keys guarantee no real LLM API calls even if a mock is misconfigured.
      - GOOGLE_API_KEY=dummy-test-key
      - ANTHROPIC_API_KEY=dummy-test-key
      - OPENAI_API_KEY=dummy-test-key
      - OCR_MODEL=gemini/gemini-2.5-flash
      - METADATA_MODEL=gemini/gemini-2.5-flash
      - CHAT_MODEL=gemini/gemini-2.5-flash
      - OCR_API_BASE=
      - METADATA_API_BASE=
      - CHAT_API_BASE=
      # Redis queue (DB 1)
      - REDIS_URL=redis://broker:6379/1
      # Qdrant vector store
      - QDRANT_URL=http://qdrant:6333
      # The embeddings API is not available in tests; connectivity check will fail gracefully.
      - EMBEDDING_API_BASE=http://nonexistent-embeddings:8102
      - TEST_PAPERLESS_USER=admin
      - TEST_PAPERLESS_PASS=admin
    # secrets: [] moved to override if needed, but not needed in tests
    depends_on:
      webserver:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      webhook-listener:
        condition: service_healthy

  ai-test:
    build:
      context: .
      dockerfile: ./ai/Dockerfile
      target: runtime
    entrypoint: []
    command: >
      bash -lc "uv sync --frozen --extra test --extra eval && python -m pytest -v /app/tests/"
    environment:
      - PAPERLESS_URL=http://webserver:8000
      - MANAGE_PAPERLESS_WORKFLOWS=false
      - PAPERLESS_TOKEN_FILE=
      - GOOGLE_API_KEY=dummy-test-key
      - ANTHROPIC_API_KEY=dummy-test-key
      - OPENAI_API_KEY=dummy-test-key
      - OCR_MODEL=gemini/gemini-2.5-flash
      - METADATA_MODEL=gemini/gemini-2.5-flash
      - CHAT_MODEL=gemini/gemini-2.5-flash
      - OCR_API_BASE=
      - METADATA_API_BASE=
      - CHAT_API_BASE=
      - REDIS_URL=redis://broker:6379/1
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_API_BASE=http://nonexistent-embeddings:8102
      - WEBHOOK_URL=http://webhook-listener:8001
      - COPILOT_URL=http://ai:8001
      - TEST_PAPERLESS_USER=admin
      - TEST_PAPERLESS_PASS=admin
    depends_on:
      webserver:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      webhook-listener:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks:
      - internal

secrets:
  paperless_token:
    file: ./secrets/paperless_token.txt
  webhook_secret:
    file: ./secrets/webhook_secret.txt
