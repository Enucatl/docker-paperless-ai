services:
  broker:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: redis
    image: docker.io/library/redis:8
    cpu_shares: 256
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - broker-data:/data
    networks:
      - internal

  db:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: postgres
    image: docker.io/library/postgres:18
    cpu_shares: 256
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql

  webserver:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-xxlarge
    user: "1000:1000"
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    cpu_shares: 256
    read_only: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=1g,mode=1777
      - /run:rw,exec,nosuid,size=16m,mode=1777
    extra_hosts:
      - "${DOCKER_DOMAIN}:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "--max-time", "2", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - export:/usr/src/paperless/export
      - /opt/paperless-consume:/usr/src/paperless/consume
      - /etc/ssl/certs/ca-certificates.crt:/usr/src/paperless/certs/ca-certificates.crt:ro
    environment:
      - PAPERLESS_SECRET_KEY
      - PAPERLESS_DBPASS
      - PAPERLESS_OCR_LANGUAGE
      - PAPERLESS_OCR_USER_ARGS
      - PAPERLESS_OCR_CLEAN=none
      - PAPERLESS_TASK_WORKERS=1
      - PAPERLESS_THREADS_PER_WORKER=1
      - PAPERLESS_WEBSERVER_WORKERS=1
      - PAPERLESS_TIME_ZONE
      - PAPERLESS_REDIS=redis://broker:6379
      - PAPERLESS_DBHOST=db
      - PAPERLESS_URL=https://paperless.${DOCKER_DOMAIN}
      - PAPERLESS_ENABLE_HTTP_REMOTE_USER=true
      - PAPERLESS_LOGOUT_REDIRECT_URL=https://authelia.${DOCKER_DOMAIN}/logout
      - PAPERLESS_EMAIL_CERTIFICATE_LOCATION=/usr/src/paperless/certs/ca-certificates.crt
      - S6_READ_ONLY_ROOT=1
    networks:
      - internal
      - traefik_proxy
    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"
      - "traefik.http.routers.paperless.rule=Host(`paperless.${DOCKER_DOMAIN}`)"
      - "traefik.http.routers.paperless.entrypoints=https"
      - "traefik.http.routers.paperless.middlewares=authelia@docker,secured@file"
      - "traefik.http.routers.paperless.tls=true"
      - "traefik.http.routers.paperless.service=paperless"
      - "traefik.http.services.paperless.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik_proxy"

  # Local observability & evaluation platform (Arize Phoenix).
  # UI: https://phoenix.${DOCKER_DOMAIN}  — traces, costs, and eval results.
  phoenix:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    image: arizephoenix/phoenix:latest
    cpu_shares: 256
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    networks:
      - internal
      - traefik_proxy
    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.phoenix.rule=Host(`phoenix.${DOCKER_DOMAIN}`)"
      - "traefik.http.routers.phoenix.entrypoints=https"
      - "traefik.http.routers.phoenix.tls=true"
      - "traefik.http.routers.phoenix.middlewares=authelia@docker,secured@file"
      - "traefik.http.routers.phoenix.service=phoenix"
      - "traefik.http.routers.phoenix-otlp.rule=Host(`phoenix-otlp.${DOCKER_DOMAIN}`) && Path(`/v1/traces`)"
      - "traefik.http.routers.phoenix-otlp.entrypoints=https"
      - "traefik.http.routers.phoenix-otlp.tls=true"
      - "traefik.http.routers.phoenix-otlp.tls.options=mtls@file"
      - "traefik.http.routers.phoenix-otlp.middlewares=secured@file"
      - "traefik.http.routers.phoenix-otlp.service=phoenix"
      - "traefik.http.services.phoenix.loadbalancer.server.port=6006"
    environment:
      - PHOENIX_DEFAULT_RETENTION_POLICY_DAYS=30
    volumes:
      - phoenixdata:/root/.phoenix


  # Qdrant vector database — stores document chunk embeddings for hybrid search.
  # Always-on, lightweight (~50 MB RAM, written in Rust).
  qdrant:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    image: qdrant/qdrant:latest
    cpu_shares: 256
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    healthcheck:
      # Bash TCP pseudo-device: fast, no external tooling needed.
      test: ["CMD", "bash", "-c", ":> /dev/tcp/127.0.0.1/6333"]
      interval: 3s
      timeout: 5s
      retries: 15
    networks:
      - internal
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshot:/qdrant/snapshots
      - qdrant_tmp:/qdrant/temp

  # Webhook listener — receives document events from Paperless and enqueues
  # doc IDs in Redis DB 1 for the AI worker to pick up.
  # Configure in Paperless: Settings → Workflows → Action: Webhook
  #   URL: http://webhook-listener:8001/webhook/document
  webhook-listener:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-small
    build:
      context: .
      dockerfile: ./listener/Dockerfile
    sysctls:
      - net.ipv6.bindv6only=0
    entrypoint: []
    command: "python -m paperless_listener.server"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://[::1]:8001/health', timeout=2)"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      - AGENT_NAME=paperless-webhook-ingress
      - REDIS_URL=redis://broker:6379/1
      - PAPERLESS_URL=http://webserver:8000
      - PAPERLESS_TOKEN_FILE=/run/secrets/paperless_token
      - WEBHOOK_SECRET_FILE=/run/secrets/webhook_secret
    secrets:
      - paperless_token
      - webhook_secret
    networks:
      - internal
    depends_on:
      broker:
        condition: service_healthy

  # AI batch post-processing — runs permanently alongside paperless.
  # Polls for documents tagged "ai-review-pending", re-OCRs them with a vision
  # LLM, extracts metadata (title, date, correspondent) with a text LLM, and
  # patches the documents via the paperless API. No paperless patches required.
  #
  # The heavy model serving (Ollama / vLLM) runs on the GPU workstation, which
  # can be turned on/off independently. While the workstation is off, this
  # service idles gracefully — documents queue up with the pending tag.
  #
  # One-shot run (skip watch mode, useful for ad-hoc processing):
  #   docker compose run --rm ai --once
  #
  # Dry run (preview without modifying anything):
  #   docker compose run --rm ai --once --dry-run
  #
  # Set up a paperless Workflow (UI → Workflows) to auto-tag new documents:
  #   Trigger: DOCUMENT_ADDED  →  Action: ASSIGNMENT, add tag "ai-review-pending"
  #
  # See ai/README.md for full setup instructions.
  ai:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-xxlarge
    build:
      context: .
      dockerfile: ./ai/Dockerfile
      target: runtime
    cpu_shares: 256
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=1777
    extra_hosts:
      - "${DOCKER_DOMAIN}:host-gateway"
    entrypoint: []
    command: "python -m paperless_ai.search.copilot_server"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://[::1]:8001/health', timeout=2)"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    environment:
      - AGENT_NAME=paperless-ai
      # Paperless connection (required)
      - PAPERLESS_URL=http://webserver:8000
      - PAPERLESS_TOKEN_FILE=/run/secrets/paperless_token
      - WEBHOOK_SECRET_FILE=/run/secrets/webhook_secret
      - PAPERLESS_WEBHOOK_URL=http://webhook-listener:8001/webhook/document
      - MANAGE_PAPERLESS_WORKFLOWS=${MANAGE_PAPERLESS_WORKFLOWS:-true}

      # OCR model — any LiteLLM vision model string:
      #   gemini/gemini-2.5-flash          (cloud, default)
      #   claude-3-5-sonnet-20241022       (cloud)
      #   gpt-4o                           (cloud)
      #   ollama/llava-llama3              (local Ollama, set OCR_API_BASE)
      #   openai/Nanonets-OCR2-3B          (local vLLM, set OCR_API_BASE)
      - OCR_MODEL

      # Metadata extraction model — text-only, called once per document.
      #   ollama/llama3.2   openai/Meta-Llama-3.1-8B-Instruct   gemini/gemini-2.5-flash
      - METADATA_MODEL

      # Chat model — used by the conversational copilot and tool planner.
      # Set this explicitly; it does not fall back to METADATA_MODEL.
      - CHAT_MODEL

      # Base URLs for local/self-hosted models (independent, can differ).
      # Examples:
      #   OCR_API_BASE=http://workstation:11434       (Ollama)
      #   OCR_API_BASE=http://workstation:8000/v1     (vLLM)
      - OCR_API_BASE
      - METADATA_API_BASE

      # Local search process tuning.
      - LOCAL_SEARCH_IDLE_TIMEOUT_SECONDS=${LOCAL_SEARCH_IDLE_TIMEOUT_SECONDS:-180}
      - LOCAL_SEARCH_WARM_ON_CHAT_LOAD=${LOCAL_SEARCH_WARM_ON_CHAT_LOAD:-true}
      - LOCAL_SEARCH_WARM_ON_STARTUP=${LOCAL_SEARCH_WARM_ON_STARTUP:-false}
      - LOCAL_SEARCH_START_METHOD=${LOCAL_SEARCH_START_METHOD:-spawn}

      # Docker secrets (_FILE variants read the key from a file, safer):
      - GOOGLE_API_KEY_FILE=/run/secrets/google_api_key
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - OPENAI_API_KEY_FILE=/run/secrets/openai_api_key
      - HF_TOKEN_FILE=/run/secrets/hf_token

      # Redis queue + Qdrant + embeddings API
      - REDIS_URL=redis://broker:6379/1
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_API_BASE
      - EMBEDDING_MODEL
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}

      # Behaviour tuning (all optional)
      - POLL_INTERVAL
      - TAG_OCR=ai:run-ocr
      - OCR_REASONING_EFFORT
      - OCR_TEMPERATURE
      - METADATA_TEMPERATURE
      - METADATA_REASONING_EFFORT
      - METADATA_MAX_TOKENS
      - METADATA_EXTRA_KWARGS
      - CHAT_TEMPERATURE
      - CHAT_REASONING_EFFORT
      - CHAT_MAX_TOKENS
      - CHAT_EXTRA_KWARGS
      - OCR_CONCURRENCY
      - LLM_RETRIES
      # - DRY_RUN=false

      # OpenTelemetry → Arize Phoenix (local, no external data sent)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://phoenix:6006/v1/traces
      - PHOENIX_CLIENT_HEADERS=api_key=local
    volumes:
      - ./ai/eval:/app/eval
    networks:
      - internal
      - traefik_proxy
    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.paperless-ai.rule=Host(`paperless.${DOCKER_DOMAIN}`) && PathPrefix(`/ai`)"
      - "traefik.http.routers.paperless-ai.entrypoints=https"
      - "traefik.http.routers.paperless-ai.tls=true"
      - "traefik.http.routers.paperless-ai.priority=200"
      - "traefik.http.routers.paperless-ai.middlewares=paperless-ai-strip,authelia@docker,secured@file"
      - "traefik.http.routers.paperless-ai.service=paperless-ai"
      - "traefik.http.middlewares.paperless-ai-strip.stripprefix.prefixes=/ai"
      - "traefik.http.services.paperless-ai.loadbalancer.server.port=8001"
    depends_on:
      webserver:
        condition: service_healthy
      broker:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      phoenix:
        condition: service_started
    secrets:
      - paperless_token
      - webhook_secret
      - openai_api_key
      - anthropic_api_key
      - google_api_key
      - hf_token

  ai-cleanup:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    build:
      context: .
      dockerfile: ./ai/Dockerfile
      target: runtime
    profiles: [cleanup]
    restart: no
    extra_hosts:
      - "${DOCKER_DOMAIN}:host-gateway"
    secrets:
      - paperless_token
      - webhook_secret
      - openai_api_key
      - anthropic_api_key
      - google_api_key
      - hf_token
    environment:
      - AGENT_NAME=paperless-ai-cleanup
      - PAPERLESS_URL=http://webserver:8000
      - PAPERLESS_TOKEN_FILE=/run/secrets/paperless_token
      - WEBHOOK_SECRET_FILE=/run/secrets/webhook_secret
      - PAPERLESS_WEBHOOK_URL=http://webhook-listener:8001/webhook/document
      - MANAGE_PAPERLESS_WORKFLOWS=false
      - OCR_MODEL
      - METADATA_MODEL
      - CHAT_MODEL
      - OCR_API_BASE
      - METADATA_API_BASE
      - GOOGLE_API_KEY_FILE=/run/secrets/google_api_key
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - OPENAI_API_KEY_FILE=/run/secrets/openai_api_key
      - HF_TOKEN_FILE=/run/secrets/hf_token
      - LLM_RETRIES
      - METADATA_REASONING_EFFORT
      - METADATA_TEMPERATURE
      - METADATA_MAX_TOKENS
      - METADATA_EXTRA_KWARGS
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://phoenix:6006/v1/traces
      - PHOENIX_CLIENT_HEADERS=api_key=local
    command: --help
    networks:
      - internal
    depends_on:
      webserver:
        condition: service_healthy
      phoenix:
        condition: service_started

  ai-eval:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    image: paperless-ai-ai-eval
    build:
      context: .
      dockerfile: ./ai/Dockerfile
      target: eval
    profiles: [eval]
    # Eval runs are one-off batch jobs with bursty PDF rasterization and
    # dataframe/LLM-judge memory use, so do not inherit the medium service
    # memory cap from the hardening baseline.
    mem_limit: 0
    memswap_limit: 0
    labels:
      - "checkmk_monitor=false"
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=1777
    extra_hosts:
      - "${DOCKER_DOMAIN}:host-gateway"
    secrets:
      - paperless_token
      - openai_api_key
      - anthropic_api_key
      - google_api_key
    entrypoint: ["python", "cli.py", "--eval"]
    command: ["--split", "${EVAL_SPLIT:-code-test}"]
    environment:
      - AGENT_NAME=paperless-ai-eval
      - PAPERLESS_URL=http://webserver:8000
      - PAPERLESS_TOKEN_FILE=/run/secrets/paperless_token
      - OCR_MODEL
      - METADATA_MODEL
      - CHAT_MODEL
      - OCR_API_BASE
      - METADATA_API_BASE
      - CHAT_API_BASE
      - GOOGLE_API_KEY_FILE=/run/secrets/google_api_key
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - OPENAI_API_KEY_FILE=/run/secrets/openai_api_key
      - REDIS_URL=redis://broker:6379/1
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_API_BASE
      - EMBEDDING_MODEL
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - PHOENIX_CLIENT_HEADERS=api_key=local
    volumes: []
    networks:
      - internal
      - traefik_proxy
    depends_on:
      webserver:
        condition: service_healthy
      qdrant:
        condition: service_started
      phoenix:
        condition: service_started


secrets:
  paperless_token:
    file: ./secrets/paperless_token.txt
  webhook_secret:
    file: ./secrets/webhook_secret.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  google_api_key:
    file: ./secrets/google_api_key.txt
  hf_token:
    file: ./secrets/hf_token.txt

networks:
  internal:
    internal: true
    enable_ipv6: true
    ipam:
      driver: default
  traefik_proxy:
    external: true

volumes:
  broker-data:
  data:
    external: true
    name: paperless-ai_data
  media:
    external: true
    name: paperless-ai_media
  export:
  pgdata:
  phoenixdata:
  qdrant_data:
  qdrant_snapshot:
  qdrant_tmp:
