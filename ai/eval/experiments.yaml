# ai/eval/experiments.yaml
# Define the array of configurations you want to test. 
# Any field omitted will fall back to the defaults defined in AgentConfig.
experiments:
  # 1. The Strict Baseline
  - name: "baseline-flash"
    ocr_model: "gemini/gemini-2.5-flash"
    metadata_model: "gemini/gemini-2.5-flash"
    temperature: 0.0

  # 2. Testing if a higher temperature helps with complex edge-case correspondents
  - name: "creative-flash"
    ocr_model: "gemini/gemini-2.5-flash"
    metadata_model: "gemini/gemini-2.5-flash"
    temperature: 0.7

  # 3. Testing OpenAI's new reasoning models
  # Note: temperature is omitted because o-series models reject it
  - name: "reasoning-o3"
    ocr_model: "gpt-4o" 
    metadata_model: "o3-mini"
    ocr_reasoning_effort: "high"

  # 4. Testing a fully local pipeline
  - name: "local-llama-vision"
    ocr_model: "openai/llava"
    # Example local base — update if your workstation IP differs
    ocr_api_base: "http://workstation:11434/v1"
    metadata_model: "openai/llama3.2"
    metadata_api_base: "http://workstation:11434/v1"
    temperature: 0.1
