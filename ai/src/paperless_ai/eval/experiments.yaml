  #   jury:
  #     - model: "gemini/gemini-2.5-flash-lite"

  - name: "nanonets-ocr-gemini-2.5-flash-lite-metadata"
    agent_class: "paperless_ai.agents.smart_graph_agent.SmartDocumentAgent"
    ocr_model: "openai/nanonets/Nanonets-OCR2-3B"
    ocr_api_base: "http://complex.home.arpa:8100/v1"
    ocr_max_image_dimension: 1920
    ocr_temperature: 0.0
    ocr_reasoning_effort: null
    metadata_model: "gemini/gemini-2.5-flash-lite"
    metadata_temperature: 1.0
    metadata_reasoning_effort: "minimal"
    jury:
      - model: "gemini/gemini-2.5-flash-lite"

  - name: "nanonets-ocr-gemini-3.1-flash-lite-metadata"
    agent_class: "paperless_ai.agents.smart_graph_agent.SmartDocumentAgent"
    ocr_model: "openai/nanonets/Nanonets-OCR2-3B"
    ocr_api_base: "http://complex.home.arpa:8100/v1"
    ocr_max_image_dimension: 1920
    ocr_temperature: 0.0
    ocr_reasoning_effort: null
    metadata_model: "gemini/gemini-3.1-flash-lite-preview"
    metadata_temperature: 1.0
    metadata_reasoning_effort: "minimal"
    jury:
      - model: "gemini/gemini-2.5-flash-lite"

  - name: "gemini-3.1-flash-lite"
    agent_class: "paperless_ai.agents.smart_graph_agent.SmartDocumentAgent"
    ocr_model: "gemini/gemini-3.1-flash-lite-preview"
    ocr_temperature: 1.0
    ocr_reasoning_effort: "minimal"
    metadata_model: "gemini/gemini-3.1-flash-lite-preview"
    metadata_temperature: 1.0
    metadata_reasoning_effort: "minimal"
    jury:
      - model: "gemini/gemini-2.5-flash-lite"

  - name: "nanonets-ocr-nuextract"
    agent_class: "paperless_ai.agents.smart_graph_agent.SmartDocumentAgent"
    # Nanonets-OCR2-3B for vision OCR, served via vLLM on complex.home.arpa:8100.
    # max-model-len is 16128; cap image dimension to stay within that budget.
    ocr_model: "openai/nanonets/Nanonets-OCR2-3B"
    ocr_api_base: "http://complex.home.arpa:8100/v1"
    ocr_max_image_dimension: 1920
    ocr_temperature: 0.0
    metadata_model: "openai/numind/NuExtract-2.0-8B-GPTQ"
    metadata_api_base: "http://complex.home.arpa:8103/v1"
    metadata_temperature: 0.0
    jury:
      - model: "gemini/gemini-2.5-flash-lite"

