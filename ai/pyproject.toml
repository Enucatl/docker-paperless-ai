[project]
name = "paperless-ai"
version = "0.1.0"
description = "AI batch post-processing for Paperless-ngx"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "litellm>=1.50",
    "httpx>=0.27",
    "PyMuPDF>=1.25",
    "Pillow>=10.0",
    "langgraph>=0.2",
    "openinference-instrumentation-litellm",
    "openinference-instrumentation-langchain",
    "opentelemetry-sdk",
    "opentelemetry-exporter-otlp",
    "arize-phoenix[evals]",
    "pandas",
    "pydantic>=2.0",
    "PyYAML>=6.0",
    "datasets",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
