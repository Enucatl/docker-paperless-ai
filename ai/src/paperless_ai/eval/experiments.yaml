# ai/eval/experiments.yaml
# Define the array of configurations you want to test.
# Any field omitted will fall back to the defaults defined in AgentConfig.
#
# agent_class is the dotted import path to the agent class to instantiate.
# Omitting it defaults to "paperless_ai.agents.smart_graph_agent.SmartDocumentAgent".
#
# llm_judge_model is the model used to evaluate title quality as a single LLM judge.
# Should be a strong, fixed model independent of the experiment to avoid
# self-grading bias. Defaults to "gemini/gemini-2.5-flash".
#
# jury replaces llm_judge_model with a panel of judges that vote by majority.
# Each member supports: model (required), api_base, reasoning_effort, temperature.
# api_base and reasoning_effort are forwarded to LiteLLM as model_kwargs.
# Ties in an even-sized jury resolve to 0.0 (conservative / "inappropriate").
experiments:
  # - name: "gemini-2.5"
  #   agent_class: "paperless_ai.agents.smart_graph_agent.SmartDocumentAgent"
  #   ocr_model: "gemini/gemini-2.5-flash-lite"
  #   ocr_temperature: 1.0
  #   ocr_reasoning_effort: "minimal"
